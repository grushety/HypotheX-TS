# VAL-020 stability tips — fragile / brittle CFs flagged by VAL-002 PROBE-IR.
# Note: the cs_below_threshold rule is reserved for VAL-032 (Counterfactual
# Stability / coefficient-space stability); it remains here as a no-op until
# VAL-032 publishes ``metrics.cs``. The condition references metrics.cs which
# safe_eval treats as False when the field is missing — so the rule never
# spuriously fires before VAL-032 ships.

- id: cs_below_threshold
  condition: "metrics.cs < 0.6"
  degree: directing
  modality: cf
  severity: 2
  message: "Edit is fragile: small jitter in {coefficient_name} flips ~{invalidation_pct}% of nearby predictions. Try perturbing by ±10%."
  paper_ref: "Dutta et al. ICML 2022"

- id: probe_ir_high
  condition: "metrics.probe_ir > 0.2"
  degree: directing
  modality: cf
  severity: 2
  message: "~{ir_pct}% of imperfect realisations of this edit would invalidate the CF. Consider a larger amplitude for a robustness margin."
  paper_ref: "Pawelczyk et al. ICLR 2023"
